<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Dashboard
    <a href="{{url_for("auth.logout")}}">logout</a>

    <table border = "1">
        <thead>
            <th>Name</th>
            <th>Email</th>
            <th>Actions</th>
        </thead>
        <tbody>
            {% for user in users%}
            <tr>
                <td>
                    {{user.name}}
                </td>
                <td>
                    {{user.email}}
                </td>
                <td>
                    <a href="{{ url_for("auth.editUsers", id = user.id)}}">edit</a>
                    <a href="">delete</a>
                </td>
            </tr>
            {%endfor%}
        </tbody>
    </table>
</body>
</html>
